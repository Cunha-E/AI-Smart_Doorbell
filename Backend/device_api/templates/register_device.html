<!DOCTYPE html>
<html>
<head>
    <title>Register Device</title>
</head>
<body>
    <h1>Register a Device</h1>
    <form action="/device/register" method="POST">
        <label>Serial Number: <input type="text" name="serial_number" required></label><br>
        <label>User ID: <input type="number" name="user_id" required></label><br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
